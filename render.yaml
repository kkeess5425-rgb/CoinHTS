services:
  - type: web
    name: coinhts
    env: python
    region: singapore
    plan: starter
    buildCommand: |
      pip install aiohttp aiosqlite asyncpg websockets fastapi "uvicorn[standard]" numpy msgspec numba scipy feedparser
      cd web/frontend && npm install && npm run build
    startCommand: python web/backend/server.py
    healthCheckPath: /api/status
    envVars:
      - key: OKX_API_KEY
        sync: false
      - key: OKX_API_SECRET
        sync: false
      - key: OKX_PASSPHRASE
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DISCORD_WEBHOOK
        sync: false
      - key: PORT
        value: 8000
      - key: PYTHONUNBUFFERED
        value: "1"
