services:
  - type: web
    name: coinhts-web
    env: python
    region: singapore
    buildCommand: |
      pip install -r requirements.txt
      pip install -r web/requirements.txt
      cd web/frontend && npm install && npm run build
    startCommand: python web/backend/server.py
    envVars:
      - key: OKX_API_KEY
        sync: false
      - key: OKX_API_SECRET
        sync: false
      - key: OKX_PASSPHRASE
        sync: false
      - key: PORT
        value: 8000
